<!DOCTYPE html>
<html>
<head>
    <title>Test Decision Coach Backend</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        button {
            background: #00D4FF;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #00b8e6;
        }
        #result {
            background: #0d0d14;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success { color: #22C55E; }
        .error { color: #F43F5E; }
    </style>
</head>
<body>
    <h1>Decision Coach Backend Test</h1>
    <p>This page tests if the Decision Coach backend is accessible.</p>
    
    <button onclick="testBackend()">Test Backend Connection</button>
    <button onclick="testLocalhost()">Test Localhost Backend</button>
    
    <div id="result"></div>
    
    <script>
        async function testBackend() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing production backend...\n';
            
            try {
                const startTime = Date.now();
                const response = await fetch('https://jamie-backend.onrender.com/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: "test message",
                        session_id: "test-session",
                        user_id: "test-user",
                        character: "jamie"
                    })
                });
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                resultDiv.innerHTML += `\nStatus: ${response.status} ${response.statusText}\n`;
                resultDiv.innerHTML += `Response time: ${duration}ms\n`;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `\n✅ SUCCESS!\n\n`;
                    resultDiv.innerHTML += `Response data:\n${JSON.stringify(data, null, 2)}\n`;
                    resultDiv.className = 'success';
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML += `\n❌ ERROR: ${response.status}\n\n`;
                    resultDiv.innerHTML += `Error: ${errorText}\n`;
                    resultDiv.className = 'error';
                }
            } catch (error) {
                resultDiv.innerHTML += `\n❌ CONNECTION FAILED\n\n`;
                resultDiv.innerHTML += `Error: ${error.message}\n\n`;
                resultDiv.innerHTML += `Possible causes:\n`;
                resultDiv.innerHTML += `• Backend is down or sleeping\n`;
                resultDiv.innerHTML += `• CORS issue (check browser console)\n`;
                resultDiv.innerHTML += `• Network connectivity problem\n`;
                resultDiv.className = 'error';
                console.error('Full error:', error);
            }
        }
        
        async function testLocalhost() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing localhost backend (http://localhost:3001/chat)...\n';
            
            try {
                const startTime = Date.now();
                const response = await fetch('http://localhost:3001/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: "test message",
                        session_id: "test-session",
                        user_id: "test-user",
                        character: "jamie"
                    })
                });
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                resultDiv.innerHTML += `\nStatus: ${response.status} ${response.statusText}\n`;
                resultDiv.innerHTML += `Response time: ${duration}ms\n`;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `\n✅ SUCCESS! Local backend is running!\n\n`;
                    resultDiv.innerHTML += `Response data:\n${JSON.stringify(data, null, 2)}\n`;
                    resultDiv.className = 'success';
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML += `\n❌ ERROR: ${response.status}\n\n`;
                    resultDiv.innerHTML += `Error: ${errorText}\n`;
                    resultDiv.className = 'error';
                }
            } catch (error) {
                resultDiv.innerHTML += `\n❌ LOCAL BACKEND NOT RUNNING\n\n`;
                resultDiv.innerHTML += `Error: ${error.message}\n\n`;
                resultDiv.innerHTML += `To run local backend:\n`;
                resultDiv.innerHTML += `1. cd DC-backup/jamie-backend\n`;
                resultDiv.innerHTML += `2. npm install\n`;
                resultDiv.innerHTML += `3. Set OPENAI_API_KEY in .env\n`;
                resultDiv.innerHTML += `4. npm start\n`;
                resultDiv.className = 'error';
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
